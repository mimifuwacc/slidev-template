shamefullyHoist: true

# `playwright-chromium` is needed for `slidev export` (PDF/PNG/PPTX) and has a
# postinstall script that downloads the browser. pnpm v11 errors on unapproved
# build scripts by default (`strictDepBuilds: true`), so allowlist it up-front.
allowBuilds:
  playwright-chromium: true
catalog:
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vitest: 4.1.9
  vite-plus: latest
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
# Drops the stray `/* #__PURE__ */` annotations in `@vueuse/core@14.3.0`'s
# dist that Rolldown can't interpret (noisy `INVALID_ANNOTATION` warnings on
# `slidev build`). Fixed upstream in vueuse/vueuse#5388 (merged), expected to
# ship in 14.4.0. Once @vueuse/core >= 14.4.0 is released: bump it, then delete
# this entry and patches/@vueuse__core@14.3.0.patch.
patchedDependencies:
  "@vueuse/core@14.3.0": patches/@vueuse__core@14.3.0.patch
